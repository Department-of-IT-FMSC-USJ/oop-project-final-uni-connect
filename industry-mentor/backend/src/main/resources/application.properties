# ==========================================
# Industry Mentor - Application Configuration
# ==========================================

server.port=9092

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/industry_mentor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Reward points configuration
reward.points.session=10
reward.points.curriculum-suggestion=5
