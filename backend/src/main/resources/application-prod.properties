# ==========================================
# UniConnect - Production Configuration
# ==========================================
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Database Configuration (set via environment variables on Render)
# SPRING_DATASOURCE_URL=jdbc:mysql://<host>:<port>/<dbname>
# SPRING_DATASOURCE_USERNAME=<username>
# SPRING_DATASOURCE_PASSWORD=<password>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# CORS (set via CORS_ALLOWED_ORIGINS env var)
# spring.mvc.cors.allowed-origins is overridden programmatically

# JWT Configuration (set JWT_SECRET env var on Render - minimum 32 chars)
# jwt.secret=${JWT_SECRET}
# jwt.expiration-ms=86400000

# Meeting URL (set via env var)
# UNICONNECT_SCHEDULING_MEETING_BASE_JOIN_URL=https://your-backend.onrender.com/meet

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
