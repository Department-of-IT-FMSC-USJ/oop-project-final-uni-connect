spring.application.name=uniconnect

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/uniconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Web Configuration
server.port=8080
spring.mvc.cors.allowed-origins=http://localhost:4321
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Points Configuration
uniconnect.points.mentor-threshold=50
