# ==========================================
# UniConnect - Application Configuration
# ==========================================

# Server Configuration
server.port=8080

# Database Configuration
# Default to in-memory H2 for local development. (Switch back to MySQL if you have it running.)
spring.datasource.url=jdbc:h2:mem:uniconnectdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver


# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Custom File Storage Configuration (monolith: student + events + reports)
file.upload-dir=uploads/materials
file.events-upload-dir=uploads/events
file.reports-dir=uploads/reports

# Web Configuration
spring.mvc.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4321}
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# JWT Configuration
jwt.secret=${JWT_SECRET:default-dev-secret-key-change-in-production-min32chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Points Configuration (industry mentor eligibility ? align with domain ?30 when wiring UI)
uniconnect.points.mentor-threshold=30
mentor.industry.min-points=30

# Scheduling configuration (provider-agnostic core with pluggable adapters)
uniconnect.scheduling.meeting.default-provider=JITSI
uniconnect.scheduling.meeting.base-join-url=${MEETING_BASE_JOIN_URL:http://localhost:8080/meet}
uniconnect.scheduling.meeting.jitsi-base-url=https://meet.jit.si
uniconnect.scheduling.meeting.jitsi-room-prefix=uniconnect
uniconnect.scheduling.meeting.minimum-duration-minutes=15
uniconnect.scheduling.meeting.reminder-lead-minutes=30

